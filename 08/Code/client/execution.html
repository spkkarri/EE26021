<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Word Magic</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=JetBrains+Mono:wght@500&display=swap');

  :root {
    --bg-1: #0f1115;
    --bg-2: #151923;
    --bg-3: #11151f;
    --blob-1: #1a2130;
    --blob-2: #1b2333;
    --text: #eef2fb;
    --muted: #95a1b8;
    --typed-color: #e8eefb;
    --pred-color: #bfd3ff;
    --ghost-border: rgba(166, 187, 220, 0.35);
    --sidebar-border: rgba(168, 180, 206, 0.18);
    --sidebar-bg: rgba(17, 22, 33, 0.78);
    --sidebar-shadow: 8px 0 24px rgba(0, 0, 0, 0.18);
    --settings-btn-border: rgba(168, 180, 206, 0.28);
    --settings-btn-bg: rgba(20, 25, 36, 0.75);
    --settings-btn-bg-hover: rgba(29, 36, 51, 0.9);
    --settings-btn-text: #dbe3f4;
    --hide-btn-bg: rgba(22, 28, 40, 0.62);
    --hide-btn-bg-hover: rgba(30, 38, 55, 0.9);
    --hide-btn-text: #dce6f9;
    --sidebar-line-start: rgba(166, 184, 219, 0.24);
    --sidebar-line-end: rgba(166, 184, 219, 0.04);
    --sidebar-title: #c6d1e6;
    --group-border: rgba(168, 180, 206, 0.14);
    --control-label: #dbe3f5;
    --control-value: #a9b8d6;
    --accent: #8ea3cc;
    --tip: #9ea9bf;
    --apply-btn-bg: rgba(27, 35, 49, 0.86);
    --apply-btn-bg-hover: rgba(34, 44, 62, 0.95);
    --apply-btn-text: #e6ebf8;
    --action-btn-border: rgba(168, 180, 206, 0.24);
    --action-btn-bg: rgba(22, 28, 40, 0.62);
    --action-btn-bg-hover: rgba(27, 35, 49, 0.82);
    --action-btn-text: #e6ebf8;
    --action-btn-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
    --mobile-sidebar-shadow: 0 -8px 24px rgba(0, 0, 0, 0.18);
    --glow-rgb: 142, 163, 204;
    --navbar-border: rgba(168, 180, 206, 0.24);
    --navbar-bg: rgba(17, 22, 33, 0.62);
    --navbar-text: #dbe3f4;
    --navbar-muted: #a9b8d6;
    --switch-link-bg: rgba(22, 28, 40, 0.6);
    --switch-link-bg-hover: rgba(27, 35, 49, 0.85);
    --switch-link-text: #e6ebf8;
  }

  body.theme-light {
    --bg-1: #f7fbff;
    --bg-2: #eef5ff;
    --bg-3: #f5f9ff;
    --blob-1: #dcebff;
    --blob-2: #dde9ff;
    --text: #1f2a3d;
    --muted: #5b6c86;
    --typed-color: #123f86;
    --pred-color: #1e6de2;
    --ghost-border: rgba(158, 198, 255, 0.65);
    --sidebar-border: #d5dbe8;
    --sidebar-bg: rgba(255, 255, 255, 0.84);
    --sidebar-shadow: 0 14px 30px rgba(21, 63, 133, 0.09);
    --settings-btn-border: rgba(15, 79, 174, 0.2);
    --settings-btn-bg: rgba(255, 255, 255, 0.84);
    --settings-btn-bg-hover: rgba(245, 250, 255, 0.98);
    --settings-btn-text: #28426f;
    --hide-btn-bg: #f5faff;
    --hide-btn-bg-hover: #eef5ff;
    --hide-btn-text: #28426f;
    --sidebar-line-start: rgba(158, 198, 255, 0.52);
    --sidebar-line-end: rgba(158, 198, 255, 0.08);
    --sidebar-title: #123f86;
    --group-border: #d5dbe8;
    --control-label: #314766;
    --control-value: #5b6c86;
    --accent: #0f4fae;
    --tip: #5b6c86;
    --apply-btn-bg: #f5faff;
    --apply-btn-bg-hover: #eef5ff;
    --apply-btn-text: #28426f;
    --action-btn-border: rgba(15, 79, 174, 0.2);
    --action-btn-bg: rgba(255, 255, 255, 0.86);
    --action-btn-bg-hover: rgba(245, 250, 255, 0.98);
    --action-btn-text: #28426f;
    --action-btn-shadow: 0 14px 30px rgba(21, 63, 133, 0.09);
    --mobile-sidebar-shadow: 0 -8px 24px rgba(21, 63, 133, 0.09);
    --glow-rgb: 30, 109, 226;
    --navbar-border: rgba(15, 79, 174, 0.2);
    --navbar-bg: rgba(255, 255, 255, 0.84);
    --navbar-text: #28426f;
    --navbar-muted: #5b6c86;
    --switch-link-bg: #f5faff;
    --switch-link-bg-hover: #eef5ff;
    --switch-link-text: #28426f;
  }

  * {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  body {
    min-height: 100vh;
    overflow: hidden;
    color: var(--text);
    font-family: 'Space Grotesk', sans-serif;
    background:
      radial-gradient(circle at 18% 12%, var(--blob-1) 0%, transparent 32%),
      radial-gradient(circle at 80% 86%, var(--blob-2) 0%, transparent 34%),
      linear-gradient(160deg, var(--bg-1) 0%, var(--bg-2) 52%, var(--bg-3) 100%);
    transition: background 220ms ease, color 220ms ease;
  }

  .app-shell {
    position: relative;
    display: flex;
    width: 100vw;
    height: 100vh;
  }

  .app-shell.settings-hidden .sidebar {
    flex-basis: 0;
    width: 0;
    min-width: 0;
    max-width: 0;
    padding-left: 0;
    padding-right: 0;
    border-right-color: transparent;
    opacity: 0;
    transform: translateX(-14px);
    pointer-events: none;
  }

  .app-shell.settings-hidden .main-canvas {
    width: 100%;
  }

  .main-canvas {
    position: relative;
    order: 1;
    flex: 1 1 auto;
    width: auto;
    min-width: 0;
    height: 100vh;
    transition: width 280ms cubic-bezier(0.2, 0.8, 0.2, 1);
  }

  .settings-toggle-btn {
    position: static;
    z-index: 30;
    height: 38px;
    padding: 0 14px;
    border-radius: 999px;
    border: 1px solid var(--settings-btn-border);
    background: var(--settings-btn-bg);
    color: var(--settings-btn-text);
    font-size: 0.78rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    transition: background 150ms ease, transform 150ms ease;
  }

  .settings-toggle-btn:hover {
    background: var(--settings-btn-bg-hover);
    transform: translateY(-1px);
  }

  .settings-toggle-btn.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .top-navbar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    z-index: 26;
    height: 62px;
    border-radius: 0;
    border-bottom: 1px solid var(--navbar-border);
    background: var(--navbar-bg);
    backdrop-filter: blur(8px);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    gap: 12px;
  }

  .nav-left-slot {
    display: flex;
    align-items: center;
    flex: 0 0 auto;
  }

  .nav-title {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    max-width: 58%;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--navbar-muted);
    font-size: 0.86rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    font-weight: 700;
    text-align: center;
    pointer-events: none;
  }

  .nav-title .model-type {
    color: var(--navbar-text);
  }

  .switch-model-link {
    flex: 0 0 auto;
    height: 28px;
    padding: 0 10px;
    border-radius: 999px;
    border: 1px solid var(--navbar-border);
    background: var(--switch-link-bg);
    color: var(--switch-link-text);
    font-size: 0.68rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 700;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
  }

  .switch-model-link:hover {
    background: var(--switch-link-bg-hover);
  }

  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 84px 24px 96px 24px;
  }

  .words-center {
    width: min(1000px, 96vw);
    min-height: 50vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-wrap: wrap;
    gap: 8px;
    text-align: center;
    align-content: center;
    padding: 0 16px;
  }

  .token {
    display: inline-block;
    font-size: clamp(1.45rem, 2.6vw, 2.45rem);
    line-height: 1.25;
    letter-spacing: 0.01em;
    font-weight: 600;
    opacity: 0;
    transform: translateY(8px);
    animation: smoothPop 380ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
  }

  .token.typed {
    color: var(--typed-color);
  }

  .token.predicted {
    color: var(--pred-color);
    animation: smoothPop 380ms cubic-bezier(0.2, 0.8, 0.2, 1) forwards, pulseGlow 850ms ease;
  }

  .ghost-word {
    font-size: clamp(1.2rem, 2.1vw, 2rem);
    color: var(--muted);
    opacity: 0.8;
    letter-spacing: 0.02em;
    padding: 0.5rem 0.15rem;
    border-bottom: 2px solid var(--ghost-border);
    min-width: 2ch;
    animation: caretBlink 1.1s steps(1) infinite;
  }

  .status {
    margin-top: 20px;
    font-size: 0.85rem;
    color: var(--muted);
    text-align: center;
    min-height: 1.4rem;
    opacity: 0.9;
  }

  .sidebar {
    position: relative;
    order: 0;
    z-index: 10;
    flex: 0 0 20%;
    width: 20%;
    min-width: 280px;
    max-width: 460px;
    height: 100vh;
    direction: ltr;
    border-right: 1px solid var(--sidebar-border);
    background: var(--sidebar-bg);
    box-shadow: var(--sidebar-shadow);
    backdrop-filter: blur(10px);
    padding: 18px 16px;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-gutter: stable;
    scrollbar-width: none;
    -ms-overflow-style: none;
    transition:
      flex-basis 300ms cubic-bezier(0.2, 0.8, 0.2, 1),
      width 300ms cubic-bezier(0.2, 0.8, 0.2, 1),
      min-width 300ms cubic-bezier(0.2, 0.8, 0.2, 1),
      max-width 300ms cubic-bezier(0.2, 0.8, 0.2, 1),
      padding 240ms ease,
      opacity 220ms ease,
      transform 300ms cubic-bezier(0.2, 0.8, 0.2, 1),
      border-color 220ms ease;
  }

  .sidebar::-webkit-scrollbar {
    width: 0;
    height: 0;
    display: none;
  }

  .sidebar-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 14px;
  }

  .hide-settings-btn {
    height: 30px;
    padding: 0 10px;
    border-radius: 999px;
    border: 1px solid var(--settings-btn-border);
    background: var(--hide-btn-bg);
    color: var(--hide-btn-text);
    font-size: 0.7rem;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    transition: background 150ms ease;
  }

  .hide-settings-btn:hover {
    background: var(--hide-btn-bg-hover);
  }

  .sidebar::before {
    content: "";
    position: sticky;
    top: 0;
    display: block;
    height: 8px;
    margin-bottom: 10px;
    background: linear-gradient(90deg, var(--sidebar-line-start), var(--sidebar-line-end));
    border-radius: 999px;
  }

  .sidebar h2 {
    font-size: 0.95rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--sidebar-title);
    margin-bottom: 0;
  }

  .control-group {
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--group-border);
  }

  .control-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    direction: ltr;
    margin-bottom: 8px;
  }

  .control-label {
    font-size: 0.83rem;
    color: var(--control-label);
  }

  .control-value {
    font-size: 0.8rem;
    color: var(--control-value);
    font-family: 'JetBrains Mono', monospace;
  }

  .control-slider {
    width: 100%;
    accent-color: var(--accent);
    outline: none;
  }

  .control-checkbox {
    width: 16px;
    height: 16px;
    accent-color: var(--accent);
  }

  .sidebar-tip {
    font-size: 0.78rem;
    color: var(--tip);
    line-height: 1.35;
  }

  .apply-settings-btn {
    width: 100%;
    height: 42px;
    margin-top: 14px;
    border-radius: 10px;
    border: 1px solid var(--settings-btn-border);
    background: var(--apply-btn-bg);
    color: var(--apply-btn-text);
    font-size: 0.82rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    font-weight: 700;
    cursor: pointer;
    transition: background 150ms ease, transform 150ms ease;
  }

  .apply-settings-btn:hover {
    background: var(--apply-btn-bg-hover);
    transform: translateY(-1px);
  }

  .action-btn {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    bottom: 24px;
    min-width: 180px;
    height: 52px;
    padding: 0 22px;
    border-radius: 999px;
    border: 1px solid var(--action-btn-border);
    background: var(--action-btn-bg);
    color: var(--action-btn-text);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.98rem;
    letter-spacing: 0.03em;
    text-transform: uppercase;
    font-weight: 700;
    backdrop-filter: blur(8px);
    box-shadow: var(--action-btn-shadow);
    transition: transform 160ms ease, background 160ms ease, min-width 180ms ease, padding 180ms ease;
  }

  .action-btn:hover {
    transform: translateX(-50%) translateY(-1px);
    background: var(--action-btn-bg-hover);
  }

  .action-btn:disabled {
    opacity: 0.55;
    cursor: not-allowed;
    transform: translateX(-50%);
  }

  .action-btn.reload-mode {
    min-width: 52px;
    width: 52px;
    padding: 0;
  }

  .action-btn.reload-mode .label {
    display: none;
  }

  @media (max-width: 1100px) {
    .app-shell {
      flex-direction: column;
    }

    .main-canvas {
      width: 100%;
      height: calc(100vh - 240px);
      transition: height 260ms cubic-bezier(0.2, 0.8, 0.2, 1);
    }

    .screen {
      padding-right: 24px;
      padding-top: 24px;
    }

    .top-navbar {
      top: 0;
      left: 0;
      right: 0;
    }

    .sidebar {
      width: 100%;
      flex-basis: 240px;
      min-width: 0;
      max-width: none;
      height: 240px;
      border-right: none;
      border-top: 1px solid var(--sidebar-border);
      box-shadow: var(--mobile-sidebar-shadow);
      transform: translateY(0);
    }

    .app-shell.settings-hidden .sidebar {
      flex-basis: 0;
      height: 0;
      min-height: 0;
      max-height: 0;
      padding-top: 0;
      padding-bottom: 0;
      border-top-color: transparent;
      opacity: 0;
      transform: translateY(-10px);
    }

    .app-shell.settings-hidden .main-canvas {
      width: 100%;
      height: 100vh;
    }
  }

  @keyframes smoothPop {
    from {
      opacity: 0;
      transform: translateY(8px);
      filter: blur(1px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
      filter: blur(0);
    }
  }

  @keyframes pulseGlow {
    0% { box-shadow: 0 0 0 rgba(var(--glow-rgb), 0); }
    50% { box-shadow: 0 0 22px rgba(var(--glow-rgb), 0.2); }
    100% { box-shadow: 0 0 0 rgba(var(--glow-rgb), 0); }
  }

  @keyframes caretBlink {
    0%, 55% { border-bottom-color: var(--ghost-border); }
    56%, 100% { border-bottom-color: rgba(var(--glow-rgb), 0); }
  }
</style>
</head>
<body>
  <div class="app-shell">
    <main class="main-canvas">
      <nav class="top-navbar" aria-label="Model navigation">
        <div class="nav-left-slot">
          <button class="settings-toggle-btn" id="settingsToggleBtn" type="button" aria-controls="settingsPanel" aria-expanded="false">Advanced Settings</button>
        </div>

        <div class="nav-title">femto-gpt - <span class="model-type" id="modelTypeLabel">Model</span></div>

        <a class="switch-model-link" id="switchModelLink" href="index.html">Switch Model</a>
      </nav>

      <div class="screen" id="screen" tabindex="0">
        <div class="words-center" id="wordsCenter"></div>
        <div class="status" id="statusText">Start typing anywhere. After every 10 words, prediction runs automatically.</div>
      </div>

      <button class="action-btn" id="actionBtn" title="Do the magic" aria-label="Do the magic">
        <span class="label">Do the magic</span>
      </button>
    </main>

    <aside class="sidebar" id="settingsPanel">
      <div class="sidebar-header">
        <h2>Advanced Settings</h2>
        <button class="hide-settings-btn" id="hideSettingsBtn" type="button">Hide</button>
      </div>

      <div class="control-group">
        <div class="control-row">
          <span class="control-label">max_new_tokens</span>
          <span class="control-value" id="valMaxTokens">30</span>
        </div>
        <input class="control-slider" id="maxNewTokens" type="range" min="5" max="100" step="1" value="30" />
      </div>

      <div class="control-group">
        <div class="control-row">
          <span class="control-label">temperature</span>
          <span class="control-value" id="valTemperature">0.85</span>
        </div>
        <input class="control-slider" id="temperature" type="range" min="0.1" max="2.0" step="0.01" value="0.85" />
      </div>

      <div class="control-group">
        <div class="control-row">
          <span class="control-label">top_k</span>
          <span class="control-value" id="valTopP">12</span>
        </div>
        <input class="control-slider" id="topP" type="range" min="1" max="100" step="1" value="12" />
      </div>

      <p class="sidebar-tip">These sliders are sent directly to backend generation on every prediction.</p>
      <button class="apply-settings-btn" id="applySettingsBtn" type="button">Apply Changes</button>
    </aside>
  </div>

<script>
  const queryParams = new URLSearchParams(window.location.search);
  const DEFAULT_API_URL = "https://renganathc-femto-gpt.hf.space";

  function resolveApiUrl(rawUrl) {
    const candidate = (rawUrl || "").trim();
    if (!candidate) return DEFAULT_API_URL;

    try {
      const parsed = new URL(candidate);
      if (parsed.hostname === "enganathc-femto-gpt.hf.space") {
        parsed.hostname = "renganathc-femto-gpt.hf.space";
      }
      if (!["http:", "https:"].includes(parsed.protocol)) {
        return DEFAULT_API_URL;
      }
      return parsed.origin + parsed.pathname;
    } catch {
      return DEFAULT_API_URL;
    }
  }

  const API_URL = resolveApiUrl(queryParams.get("api_url"));
  const WORD_THRESHOLD = 10;

  const themeFromQuery = queryParams.get("theme");
  const themeFromStorage = localStorage.getItem("femto-theme");
  const activeTheme = ["light", "dark"].includes(themeFromQuery)
    ? themeFromQuery
    : (["light", "dark"].includes(themeFromStorage) ? themeFromStorage : "dark");
  document.body.classList.toggle("theme-light", activeTheme === "light");
  localStorage.setItem("femto-theme", activeTheme);

  const intentFromQuery = queryParams.get("intent");

  const wordsCenter = document.getElementById("wordsCenter");
  const statusText = document.getElementById("statusText");
  const actionBtn = document.getElementById("actionBtn");
  const screen = document.getElementById("screen");
  const appShell = document.querySelector(".app-shell");
  const settingsPanel = document.getElementById("settingsPanel");
  const settingsToggleBtn = document.getElementById("settingsToggleBtn");
  const hideSettingsBtn = document.getElementById("hideSettingsBtn");
  const applySettingsBtn = document.getElementById("applySettingsBtn");
  const modelTypeLabel = document.getElementById("modelTypeLabel");
  const switchModelLink = document.getElementById("switchModelLink");

  const reloadIcon = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12a9 9 0 1 1-2.64-6.36"/><polyline points="21 3 21 9 15 9"/></svg>`;

  let committedWords = [];
  let cycleWords = [];
  let currentWord = "";
  let typedSincePrediction = 0;
  let predicting = false;
  let appliedGenerationSettings = null;

  const controls = {
    maxNewTokens: document.getElementById("maxNewTokens"),
    temperature: document.getElementById("temperature"),
    topP: document.getElementById("topP")
  };

  const controlValueEls = {
    maxNewTokens: document.getElementById("valMaxTokens"),
    temperature: document.getElementById("valTemperature"),
    topP: document.getElementById("valTopP")
  };

  function setupNavbar() {
    const modelType = (intentFromQuery || "Model").replace(/\+/g, " ").trim();
    modelTypeLabel.textContent = modelType || "Model";
    switchModelLink.href = `index.html?theme=${activeTheme}`;
  }

  switchModelLink.addEventListener("click", (e) => {
    e.preventDefault();
    window.location.replace(switchModelLink.href);
  });

  function getGenerationSettingsFromControls() {
    return {
      max_new_tokens: Number(controls.maxNewTokens.value),
      temperature: Number(controls.temperature.value),
      top_k: Number(controls.topP.value)
    };
  }

  function bindControlDisplay() {
    controls.maxNewTokens.addEventListener("input", () => {
      controlValueEls.maxNewTokens.textContent = controls.maxNewTokens.value;
    });
    controls.temperature.addEventListener("input", () => {
      controlValueEls.temperature.textContent = Number(controls.temperature.value).toFixed(2);
    });
    controls.topP.addEventListener("input", () => {
      controlValueEls.topP.textContent = Number(controls.topP.value).toFixed(2);
    });
  }

  function splitWords(text) {
    return text.trim().split(/\s+/).filter(Boolean);
  }

  function sanitizeWord(raw) {
    return raw.replace(/\s+/g, " ").trim();
  }

  function makeToken(word, kind, delay) {
    const span = document.createElement("span");
    span.className = `token ${kind}`;
    span.textContent = word;
    span.style.animationDelay = `${delay}ms`;
    return span;
  }

  function renderWords() {
    wordsCenter.innerHTML = "";

    const allWords = committedWords.slice();
    allWords.forEach((w, i) => {
      wordsCenter.appendChild(makeToken(w, "typed", Math.min(i * 18, 180)));
    });

    if (currentWord) {
      const ghost = document.createElement("span");
      ghost.className = "ghost-word";
      ghost.textContent = currentWord;
      wordsCenter.appendChild(ghost);
    }
  }

  function updateStatus(message) {
    statusText.textContent = message;
  }

  function setSettingsVisible(visible) {
    appShell.classList.toggle("settings-hidden", !visible);
    settingsToggleBtn.classList.toggle("hidden", visible);
    settingsToggleBtn.setAttribute("aria-expanded", String(visible));
  }

  function applySettings(closeDrawer = true) {
    appliedGenerationSettings = getGenerationSettingsFromControls();
    updateStatus("Advanced settings applied.");
    if (closeDrawer) setSettingsVisible(false);
    screen.focus();
  }

  function toggleSettingsVisible() {
    const hidden = appShell.classList.contains("settings-hidden");
    setSettingsVisible(hidden);
  }

  function setActionMode(mode) {
    if (mode === "reload") {
      actionBtn.classList.add("reload-mode");
      actionBtn.innerHTML = reloadIcon;
      actionBtn.title = "Reload";
      actionBtn.setAttribute("aria-label", "Reload");
      return;
    }

    actionBtn.classList.remove("reload-mode");
    actionBtn.innerHTML = `<span class="label">Do the magic</span>`;
    actionBtn.title = "Do the magic";
    actionBtn.setAttribute("aria-label", "Do the magic");
  }

  function commitCurrentWord() {
    const word = sanitizeWord(currentWord);
    if (!word) {
      currentWord = "";
      renderWords();
      return false;
    }

    committedWords.push(word);
    cycleWords.push(word);
    if (cycleWords.length > WORD_THRESHOLD) {
      cycleWords = cycleWords.slice(-WORD_THRESHOLD);
    }
    typedSincePrediction += 1;
    currentWord = "";
    renderWords();
    updateStatus(`Typed ${Math.min(typedSincePrediction, WORD_THRESHOLD)}/${WORD_THRESHOLD} words for next prediction.`);

    if (cycleWords.length >= WORD_THRESHOLD && !predicting) {
      setTimeout(() => {
        requestPrediction();
      }, 120);
    }
    return true;
  }

  async function requestPrediction() {
    if (predicting) return;
    if (!cycleWords.length) {
      updateStatus(`Type up to ${WORD_THRESHOLD} words before pressing Do the magic.`);
      return;
    }

    predicting = true;
    actionBtn.disabled = true;
    updateStatus("Predicting next words...");

    try {
      const context = cycleWords.slice(-WORD_THRESHOLD).join(" ");
      const generationSettings = appliedGenerationSettings || getGenerationSettingsFromControls();
      const maxWordsToShow = Math.max(1, Number(generationSettings.max_new_tokens) || 5);
      const normalizedApiBase = API_URL.replace(/\/+$/, "");
      const generateEndpoint = normalizedApiBase.endsWith("/generate")
        ? normalizedApiBase
        : `${normalizedApiBase}/generate`;
      
      const res = await fetch(generateEndpoint, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          prompt: context,
          max_tokens: generationSettings.max_new_tokens,
          temperature: generationSettings.temperature,
          top_k: generationSettings.top_k,
        })
      });

      const rawBody = await res.text();
      let data = {};
      try {
        data = rawBody ? JSON.parse(rawBody) : {};
      } catch {
        const preview = rawBody.slice(0, 120).replace(/\s+/g, " ").trim();
        throw new Error(
          `Server returned non-JSON from ${generateEndpoint} (HTTP ${res.status}). ${preview || "Empty response body."}`
        );
      }

      if (!res.ok) {
        throw new Error(data.error || data.message || `Prediction failed (HTTP ${res.status})`);
      }

      const rawText = [data.generated, data.text, data.response, data.output]
        .find((value) => typeof value === "string" && value.trim().length > 0) || "";
      const cleanedText = rawText.replace(/\u2026/g, " ").replace(/\s+/g, " ").trim();

      let generatedText = cleanedText;
      if (generatedText.startsWith(context)) {
        generatedText = generatedText.slice(context.length).trim();
      }

      const predicted = splitWords(generatedText).slice(0, maxWordsToShow);
      
      if (!predicted.length) {
        updateStatus("No words generated. Try again.");
        cycleWords = [];
        typedSincePrediction = 0;
        return;
      }

      predicted.forEach((w, i) => {
        setTimeout(() => {
          committedWords.push(w);
          const token = makeToken(w, "predicted", 0);
          wordsCenter.appendChild(token);
        }, i * 130);
      });

      typedSincePrediction = 0;
      cycleWords = [];
      const finalTimeout = predicted.length * 130 + 60;
      setTimeout(() => {
        setActionMode("reload");
        updateStatus("Prediction complete. Use reload to clear screen and start a new cycle.");
        renderWords();
      }, finalTimeout);
    } catch (err) {
      updateStatus(`Prediction failed: ${err.message}`);
    } finally {
      setTimeout(() => {
        predicting = false;
        actionBtn.disabled = false;
      }, 220);
    }
  }

  function refreshCanvas() {
    if (predicting) return;
    committedWords = [];
    cycleWords = [];
    currentWord = "";
    typedSincePrediction = 0;
    setActionMode("magic");
    renderWords();
    updateStatus(`Canvas refreshed. Type up to ${WORD_THRESHOLD} words, then press Do the magic.`);
    screen.focus();
  }

  function handlePrintableKey(e) {
    if (e.ctrlKey || e.metaKey || e.altKey) return;
    if (e.key.length !== 1) return;

    currentWord += e.key;
    renderWords();
    updateStatus(`Typed ${Math.min(typedSincePrediction, WORD_THRESHOLD)}/${WORD_THRESHOLD} words for next prediction.`);
  }

  window.addEventListener("keydown", (e) => {
    const tag = (e.target && e.target.tagName) || "";
    if (tag === "INPUT" || tag === "TEXTAREA") return;

    if (e.key === " ") {
      e.preventDefault();
      commitCurrentWord();
      return;
    }

    if (e.key === "Enter") {
      e.preventDefault();
      commitCurrentWord();
      return;
    }

    if (e.key === "Backspace") {
      e.preventDefault();
      if (currentWord.length) {
        currentWord = currentWord.slice(0, -1);
      } else if (committedWords.length) {
        currentWord = committedWords.pop();
        if (typedSincePrediction > 0) typedSincePrediction -= 1;
      }
      renderWords();
      return;
    }

    handlePrintableKey(e);
  });

  window.addEventListener("click", () => screen.focus());
  settingsToggleBtn.addEventListener("click", (e) => {
    e.stopPropagation();
    toggleSettingsVisible();
  });
  hideSettingsBtn.addEventListener("click", () => setSettingsVisible(false));
  applySettingsBtn.addEventListener("click", () => applySettings(true));

  actionBtn.addEventListener("click", () => {
    if (actionBtn.classList.contains("reload-mode")) {
      refreshCanvas();
      return;
    }
    requestPrediction();
  });

  window.addEventListener("load", () => {
    setupNavbar();
    screen.focus();
    bindControlDisplay();
    setSettingsVisible(true);
    appliedGenerationSettings = getGenerationSettingsFromControls();
    setActionMode("magic");
    renderWords();
    updateStatus(`Type up to ${WORD_THRESHOLD} words. Prediction runs automatically when the limit is reached, or press Do the magic manually.`);
  });
</script>
</body>
</html>
